<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To-Do List</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #1a1a2e;
      font-family: 'Courier New', Courier, monospace;
    }

    .container {
      background-color: #16213e;
      border: 2px solid #0f3460;
      border-radius: 20px;
      padding: 40px;
      width: 480px;
    }

    h1 {
      text-align: center;
      color: #e0e0e0;
      font-size: 18px;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 30px;
    }

    .input-area {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
    }

    #taskInput {
      flex: 1;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1.5px solid #0f3460;
      background-color: #1a1a2e;
      color: #e0e0e0;
      font-size: 15px;
      font-family: 'Courier New', Courier, monospace;
      outline: none;
    }

    #taskInput:focus {
      border-color: #00d4ff;
    }

    #addBtn {
      padding: 12px 20px;
      background-color: #00d4ff;
      color: #1a1a2e;
      border: none;
      border-radius: 10px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
    }

    #addBtn:hover {
      background-color: #00b8d9;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
      font-size: 13px;
      color: #a0a0b0;
      letter-spacing: 1px;
    }

    #taskList {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 360px;
      overflow-y: auto;
    }

    #taskList::-webkit-scrollbar {
      width: 5px;
    }
    #taskList::-webkit-scrollbar-track {
      background: #1a1a2e;
    }
    #taskList::-webkit-scrollbar-thumb {
      background: #0f3460;
      border-radius: 10px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background-color: #1a1a2e;
      border: 1.5px solid #0f3460;
      border-radius: 10px;
      padding: 12px 14px;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-item.completed {
      opacity: 0.5;
      border-color: #00d4ff33;
    }

    .task-item.completed .task-text {
      text-decoration: line-through;
      color: #a0a0b0;
    }

    
    .task-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #00d4ff;
      cursor: pointer;
      flex-shrink: 0;
    }

    .task-text {
      flex: 1;
      color: #e0e0e0;
      font-size: 15px;
      word-break: break-word;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #ff4d6d;
      font-size: 18px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      background-color: #ff4d6d22;
    }

    .empty-msg {
      text-align: center;
      color: #a0a0b0;
      font-size: 14px;
      padding: 30px 0;
      letter-spacing: 1px;
    }

    .clear-btn {
      width: 100%;
      margin-top: 20px;
      padding: 10px;
      background: none;
      border: 1.5px solid #ff4d6d55;
      border-radius: 10px;
      color: #ff4d6d;
      font-size: 13px;
      letter-spacing: 2px;
      cursor: pointer;
      font-family: 'Courier New', Courier, monospace;
    }

    .clear-btn:hover {
      background-color: #ff4d6d11;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>To-Do List</h1>

    
    <div class="input-area">
      <input type="text" id="taskInput" placeholder="Add a new task..." />
      <button id="addBtn" onclick="addTask()">+</button>
    </div>

    
    <div class="stats">
      <span>Total: <strong id="totalCount">0</strong></span>
      <span>Done: <strong id="doneCount">0</strong></span>
      <span>Remaining: <strong id="remainCount">0</strong></span>
    </div>

    
    <ul id="taskList">
      <li class="empty-msg" id="emptyMsg">No tasks yet. Add one above!</li>
    </ul>

    
    <button class="clear-btn" onclick="clearAll()">CLEAR ALL TASKS</button>
  </div>

  <script>
    
    document.getElementById('taskInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') addTask();
    });

    
    function addTask() {
      var input = document.getElementById('taskInput');
      var text  = input.value.trim();

      if (text === '') {
        input.focus();
        return;
      }

      
      document.getElementById('emptyMsg').style.display = 'none';

      
      var li = document.createElement('li');
      li.className = 'task-item';

      
      var checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.addEventListener('change', function() {
        if (checkbox.checked) {
          li.classList.add('completed');
        } else {
          li.classList.remove('completed');
        }
        updateStats();
      });

      
      var span = document.createElement('span');
      span.className = 'task-text';
      span.textContent = text;

      
      var delBtn = document.createElement('button');
      delBtn.className = 'delete-btn';
      delBtn.textContent = '✕';
      delBtn.title = 'Remove task';
      delBtn.addEventListener('click', function() {
        removeTask(li);
      });

      
      li.appendChild(checkbox);
      li.appendChild(span);
      li.appendChild(delBtn);
      document.getElementById('taskList').appendChild(li);

      
      input.value = '';
      input.focus();

      updateStats();
    }

    
    function removeTask(li) {
      li.style.transition = 'opacity 0.2s';
      li.style.opacity = '0';
      setTimeout(function() {
        li.remove();
        checkEmpty();
        updateStats();
      }, 200);
    }

    
    function clearAll() {
      var list  = document.getElementById('taskList');
      var items = list.querySelectorAll('.task-item');
      items.forEach(function(item) {
        item.remove();
      });
      checkEmpty();
      updateStats();
    }

    
    function checkEmpty() {
      var list  = document.getElementById('taskList');
      var items = list.querySelectorAll('.task-item');
      var msg   = document.getElementById('emptyMsg');

      if (items.length === 0) {
        msg.style.display = 'block';
      }
    }

    
    function updateStats() {
      var allItems  = document.querySelectorAll('.task-item');
      var doneItems = document.querySelectorAll('.task-item.completed');

      var total     = allItems.length;
      var done      = doneItems.length;
      var remaining = total - done;

      document.getElementById('totalCount').textContent  = total;
      document.getElementById('doneCount').textContent   = done;
      document.getElementById('remainCount').textContent = remaining;
    }
  </script>

</body>
</html>
