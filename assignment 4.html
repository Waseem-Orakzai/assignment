<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #1a1a2e;
      font-family: 'Courier New', Courier, monospace;
    }

    .container {
      background-color: #16213e;
      border: 2px solid #0f3460;
      border-radius: 20px;
      padding: 40px;
      width: 460px;
      text-align: center;
    }

    h1 {
      color: #e0e0e0;
      font-size: 18px;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    
    .apikey-area {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    #apiKeyInput {
      flex: 1;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1.5px solid #0f3460;
      background-color: #1a1a2e;
      color: #e0e0e0;
      font-size: 13px;
      font-family: 'Courier New', Courier, monospace;
      outline: none;
    }

    #apiKeyInput:focus { border-color: #00d4ff; }

    #saveKeyBtn {
      padding: 10px 16px;
      background-color: #0f3460;
      color: #00d4ff;
      border: 1.5px solid #00d4ff55;
      border-radius: 10px;
      font-size: 13px;
      cursor: pointer;
      font-family: 'Courier New', Courier, monospace;
    }

    #saveKeyBtn:hover { background-color: #00d4ff22; }

    .key-hint {
      font-size: 11px;
      color: #a0a0b0;
      margin-bottom: 20px;
      letter-spacing: 0.5px;
    }

    .key-hint a { color: #00d4ff; }

    
    .input-area {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }

    #cityInput {
      flex: 1;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1.5px solid #0f3460;
      background-color: #1a1a2e;
      color: #e0e0e0;
      font-size: 15px;
      font-family: 'Courier New', Courier, monospace;
      outline: none;
    }

    #cityInput:focus { border-color: #00d4ff; }

    #searchBtn {
      padding: 12px 20px;
      background-color: #00d4ff;
      color: #1a1a2e;
      border: none;
      border-radius: 10px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
    }

    #searchBtn:hover { background-color: #00b8d9; }

    
    #errorMsg {
      display: none;
      color: #ff4d6d;
      font-size: 13px;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }

    
    #loading {
      display: none;
      color: #a0a0b0;
      font-size: 14px;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    
    #weatherCard {
      display: none;
      background-color: #1a1a2e;
      border: 1.5px solid #0f3460;
      border-radius: 16px;
      padding: 28px 20px;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #cityName {
      font-size: 22px;
      color: #e0e0e0;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }

    #countryName {
      font-size: 13px;
      color: #a0a0b0;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }

    #weatherIcon {
      font-size: 64px;
      margin-bottom: 10px;
    }

    #temperature {
      font-size: 56px;
      color: #00d4ff;
      font-weight: bold;
      letter-spacing: -2px;
      margin-bottom: 6px;
    }

    #condition {
      font-size: 16px;
      color: #e0e0e0;
      text-transform: capitalize;
      letter-spacing: 2px;
      margin-bottom: 24px;
    }

    
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .stat-box {
      background-color: #16213e;
      border: 1px solid #0f3460;
      border-radius: 10px;
      padding: 12px 8px;
    }

    .stat-label {
      font-size: 11px;
      color: #a0a0b0;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 17px;
      color: #00d4ff;
      font-weight: bold;
    }

    
    .extra-row {
      display: flex;
      justify-content: space-between;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #0f3460;
      font-size: 13px;
      color: #a0a0b0;
    }

    .extra-row span strong {
      color: #e0e0e0;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Weather App</h1>

  
  <div class="apikey-area">
    <input type="text" id="apiKeyInput" placeholder="Paste your OpenWeatherMap API key..." />
    <button id="saveKeyBtn" onclick="saveKey()">Save</button>
  </div>
  <p class="key-hint">
    Free API key: <a href="https://openweathermap.org/api" target="_blank">openweathermap.org/api</a>
    &nbsp;→ Sign up → Copy key
  </p>

  
  <div class="input-area">
    <input type="text" id="cityInput" placeholder="Enter city name..." />
    <button id="searchBtn" onclick="getWeather()">&#9906;</button>
  </div>

  <p id="errorMsg"></p>
  <p id="loading">Fetching weather...</p>

  
  <div id="weatherCard">
    <div id="cityName">--</div>
    <div id="countryName">--</div>
    <div id="weatherIcon">🌤</div>
    <div id="temperature">--°C</div>
    <div id="condition">--</div>

    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-label">Humidity</div>
        <div class="stat-value" id="humidity">--%</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Wind</div>
        <div class="stat-value" id="wind">-- km/h</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Pressure</div>
        <div class="stat-value" id="pressure">-- hPa</div>
      </div>
    </div>

    <div class="extra-row">
      <span>Feels like: <strong id="feelsLike">--</strong></span>
      <span>Min: <strong id="tempMin">--</strong></span>
      <span>Max: <strong id="tempMax">--</strong></span>
    </div>
  </div>
</div>

<script>
  var API_KEY = '';

  
  window.onload = function() {
    var saved = localStorage.getItem('owm_api_key');
    if (saved) {
      API_KEY = saved;
      document.getElementById('apiKeyInput').value = saved;
    }
  };

  function saveKey() {
    var key = document.getElementById('apiKeyInput').value.trim();
    if (key === '') { showError('Please enter a valid API key.'); return; }
    API_KEY = key;
    localStorage.setItem('owm_api_key', key);
    showError('');
    alert('API key saved! Now search for a city.');
  }

  
  document.getElementById('cityInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') getWeather();
  });

  
  function getEmoji(main) {
    var map = {
      'Clear'        : '☀️',
      'Clouds'       : '☁️',
      'Rain'         : '🌧️',
      'Drizzle'      : '🌦️',
      'Thunderstorm' : '⛈️',
      'Snow'         : '❄️',
      'Mist'         : '🌫️',
      'Fog'          : '🌫️',
      'Haze'         : '🌫️',
      'Smoke'        : '🌫️',
      'Dust'         : '🌪️',
      'Sand'         : '🌪️',
      'Tornado'      : '🌪️'
    };
    return map[main] || '🌤️';
  }

  function showError(msg) {
    var el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = msg ? 'block' : 'none';
  }

  
  function getWeather() {
    var city = document.getElementById('cityInput').value.trim();

    if (API_KEY === '') {
      showError('Please save your API key first.');
      return;
    }
    if (city === '') {
      showError('Please enter a city name.');
      return;
    }

    showError('');
    document.getElementById('loading').style.display = 'block';
    document.getElementById('weatherCard').style.display = 'none';

    
    var url = 'https://api.openweathermap.org/data/2.5/weather'
            + '?q=' + encodeURIComponent(city)
            + '&appid=' + API_KEY
            + '&units=metric';

    
    fetch(url)
      .then(function(response) {
        return response.json();
      })
      .then(function(data) {
        document.getElementById('loading').style.display = 'none';

        if (data.cod !== 200) {
          showError('City not found. Please try again.');
          return;
        }

        
        document.getElementById('cityName').textContent    = data.name;
        document.getElementById('countryName').textContent = data.sys.country;
        document.getElementById('temperature').textContent = Math.round(data.main.temp) + '°C';
        document.getElementById('condition').textContent   = data.weather[0].description;
        document.getElementById('weatherIcon').textContent = getEmoji(data.weather[0].main);
        document.getElementById('humidity').textContent    = data.main.humidity + '%';
        document.getElementById('wind').textContent        = Math.round(data.wind.speed * 3.6) + ' km/h';
        document.getElementById('pressure').textContent    = data.main.pressure + ' hPa';
        document.getElementById('feelsLike').textContent   = Math.round(data.main.feels_like) + '°C';
        document.getElementById('tempMin').textContent     = Math.round(data.main.temp_min) + '°C';
        document.getElementById('tempMax').textContent     = Math.round(data.main.temp_max) + '°C';

        document.getElementById('weatherCard').style.display = 'block';
      })
      .catch(function(error) {
        document.getElementById('loading').style.display = 'none';
        showError('Network error. Check your connection.');
      });
  }
</script>

</body>
</html>
